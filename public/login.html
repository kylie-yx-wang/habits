<head>
  <link rel="stylesheet" href="styles.css">
</head>

<h2>Register</h2>
<form method="POST" action="/register">
  <input name="username" placeholder="Username" required />
  <input name="password" type="password" placeholder="Password" required />
  <button class="login-btn">Register</button>
</form>

<h2>Login</h2>
<form method="POST" action="/login">
  <input name="username" placeholder="Username" required />
  <input name="password" type="password" placeholder="Password" required />
  <button class="login-btn">Login</button>
</form>

<div id="message"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const messageDiv = document.getElementById("message");

  if (params.get("registered")) {
    messageDiv.innerText = "Registered successfully!";
    messageDiv.style.color = "green";
  }

  if (params.get("error") == "exists") {
    messageDiv.innerText = "Username already exists.";
    messageDiv.style.color = "red";
  }

  if (params.get("error") == "incorrect") {
    messageDiv.innerText = "Incorrect password.";
    messageDiv.style.color = "red";
  }

  if (params.get("error") == "nonexistent") {
    messageDiv.innerText = "User not found.";
    messageDiv.style.color = "red";
  }
</script>
