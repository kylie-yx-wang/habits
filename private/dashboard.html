<h2>My Goals</h2>
<form method="POST" action="/incr_goals">
  <div id="goals"></div>
  <input type="submit" value="Update Progress" id="incr_button"> 
</form>

<a href="/settings">Settings</a>

<script src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.js"></script>
<script>

async function loadGoals() {
  const response = await fetch('/goals');
  const goals = await response.json();

  const container = document.getElementById("goals");
  container.innerHTML = "";

  // 1. Check if the array is empty
  if (goals.length === 0) {
    container.innerHTML = `<p>You have no goals yet. Set a goal in settings!</p>`;
    document.getElementById("incr_button").style.display = "none";
    return; // Exit the function early
  }

  const today = new Date();
  // 2. If goals exist, loop through them
  goals.forEach(goal => {
    const div = document.createElement("div");
    const start_date = new Date(goal.start_date);
    const end_date = new Date(goal.end_date);
    const date_percent = Math.round((today - start_date)/
      (end_date - start_date)*100);
    const progress_percent = Math.round(goal.done/goal.aim*100);
    div.innerHTML = `
      <strong>${goal.name.toUpperCase()}  ${(goal.done >= goal.aim) ? '  (Done! ✅)': ''}</strong><br><br>
      Completed: ${goal.done} / ${goal.aim}<br><br>
      Progress:
      <meter value="${progress_percent}" min="0" max="100" 
        low="${date_percent-25}" high="${date_percent}" optimum="100">${progress_percent}%</meter> 
      ${progress_percent}%
      <br><br>
      Time passed:
      <meter value="${date_percent}" min="0" max="100">${date_percent}%</meter> ${date_percent}%<br><br>
      Check one off!<br>
      <input type="checkbox" name="goal_checkbox" value="${goal.id}">
      <br>
      <hr>
    `;
    container.appendChild(div);
  });
}

loadGoals();

// import JSConfetti from 'js-confetti'

const jsConfetti = new JSConfetti();

window.onload = () => {
    const urlParams = new URLSearchParams(window.location.search);
    
    if (urlParams.has('finished')) {
      jsConfetti.addConfetti({
        confettiColors: [
          '#ff0a54', '#ff477e', '#ff7096', '#ff85a1', '#fbb1bd', '#f9bec7',
        ],
        confettiRadius: 6,
        confettiNumber: 400,
      });
    }
    else if (urlParams.has('updated') || urlParams.has('saved')) {
      jsConfetti.addConfetti({
        confettiColors: [
          '#ff0a54', '#ff477e', '#ff7096', '#ff85a1', '#fbb1bd', '#f9bec7',
        ],
        confettiRadius: 4,
        confettiNumber: 100,
      });
    }
};


</script>
