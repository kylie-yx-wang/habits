<h2>My Goals</h2>
<form method="POST" action="/incr_goals">
  <div id="goals"></div>
  <input type="submit" value="Update Progress" id="incr_button"> 
</form>

<a href="/settings">Settings</a>

<script>
async function loadGoals() {
  const response = await fetch('/goals');
  const goals = await response.json();

  const container = document.getElementById("goals");
  container.innerHTML = "";

  // 1. Check if the array is empty
  if (goals.length === 0) {
    container.innerHTML = `<p>You have no goals yet. Set a goal in settings!</p>`;
    document.getElementById("incr_button").style.display = "none";
    return; // Exit the function early
  }

  // 2. If goals exist, loop through them
  goals.forEach(goal => {
    const div = document.createElement("div");
    div.innerHTML = `
      <strong>${goal.name}</strong><br>
      Progress: ${goal.done} / ${goal.aim}<br><br>
      <input type="checkbox" name="goal_checkbox" value="${goal.id}">
      <br>
      <hr>
    `;
    container.appendChild(div);
  });
}

loadGoals();
</script>
