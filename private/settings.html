<head>
    <link rel="stylesheet" href="styles.css">
</head>

<h1>Settings</h1>

<button id="goal_btn">Make a goal</button>

<div id="goal_inputs">
    <form method="POST" action="/make_goal">
        <br>
        <label for="name">I will: </label>
        <input type="text" id="goal_name" name="name" 
            minlength="1" maxlength="50" placeholder="do something"><br><br>

        <input type="number" id="goal_freq" name="freq" 
            placeholder="1">
        <label for="freq">time(s)</label><br><br>

        <label for="period">every </label>
        <select id="goal_period" name="period">
            <option value="day">day</option>
            <option value="week">week</option>
            <option value="month">month</option>
            <option value="year">year</option>
        </select><br><br>

        <label for="from">from </label>
        <input type="date" id="goal_from" name="from">

        <label for="to"> to </label>
        <input type="date" id="goal_to" name="to"><br><br>

        <input type="range" id="goal_leniency" name="leniency"
            min="50" max="100">
        <label for="leniency"><span id="leniency_value">75</span>% of the time.</label><br><br>

        <input type="checkbox" id="goal_lock" name="lock">
        <label for="lock">Lock this goal after 1 week of the start date (I will not be able to edit or delete it).</label><br><br>

        <input type="submit" value="Save">
    </form>

</div>

<script>
    // make goal button (open the goal set page)
    const btn = document.getElementById("goal_btn");

    function display_inputs() {
        document.getElementById("goal_inputs").style.display = "block";
    }

    btn.addEventListener("click", display_inputs);

    // range slider

    const slider = document.getElementById("goal_leniency");
    const output = document.getElementById("leniency_value");

    // Update the current slider value (each time you drag the slider handle)
    slider.oninput = function() {
        output.innerHTML = this.value;
    }


</script>
