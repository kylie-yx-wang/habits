<head>
    <link rel="stylesheet" href="styles.css">
</head>

<h1>Settings</h1>

<button id="goal_btn">Set a new goal</button>

<div id="goal_inputs">
    <form method="POST" action="/make_goal">
        <br>
        <label for="name">I will: </label>
        <input type="text" id="goal_name" name="name" 
            minlength="1" maxlength="50" placeholder="do something"><br><br>

        <input type="number" id="goal_freq" name="freq" 
            placeholder="1">
        <label for="freq">time(s)</label><br><br>

        <label for="period">every </label>
        <select id="goal_period" name="period">
            <option value="day">day</option>
            <option value="week">week</option>
            <option value="month">month</option>
            <option value="year">year</option>
        </select><br><br>

        <label for="from">from </label>
        <input type="date" id="goal_from" name="from">

        <label for="to"> to </label>
        <input type="date" id="goal_to" name="to"><br><br>

        <input type="range" id="goal_leniency" name="leniency"
            min="50" max="100">
        <label for="leniency"><span id="leniency_value">75</span>% of the time.</label><br><br>

        <input type="checkbox" id="goal_lock" name="lock">
        <label for="lock">Lock this goal 1 week after the start date (I will not be able to edit or delete)</label><br><br>

        <input type="submit" value="Set goal!">
    </form>
</div>

<h2>My Goals</h2>
<div id="setting_goals"></div>

<a href="/dashboard">Dashboard</a>

<script>
    // make goal button (open the goal set page)
    const btn = document.getElementById("goal_btn");

    function display_inputs() {
        document.getElementById("goal_inputs").style.display = "block";
    }

    btn.addEventListener("click", display_inputs);

    // range slider

    const slider = document.getElementById("goal_leniency");
    const output = document.getElementById("leniency_value");

    // Update the current slider value (each time you drag the slider handle)
    slider.oninput = function() {
        output.innerHTML = this.value;
    }

    function editGoal(goalId) {
        document.getElementById(`edit${goalId}`).style.display = "block";
    }


    const editDiv = document.getElementById("setting_goals");    
    editDiv.addEventListener('click', (e) => {
        if (e.target.classList.contains('edit-btn')) {
        const goalId = e.target.getAttribute('data-id');
        editGoal(goalId);
        }
    });

    async function loadSettingsGoals() {
        try {
            const response = await fetch('/goals');
            const setting_goals = await response.json();

            const container = document.getElementById("setting_goals");
            container.innerHTML = "";

            // 1. Check if the array is empty
            if (setting_goals.length === 0) {
                container.innerHTML = `<p>You have no goals yet. Click "Set a new goal" to set your first goal!</p>`;
                return; // Exit the function early
            }

            // 2. If goals exist, loop through them
            setting_goals.forEach(goal => {
                const div = document.createElement("div");
                const today = new Date();
                const lock_date = new Date(goal.start_date);
                lock_date.setDate(lock_date.getDate()+7);
                const isLocked = goal.lock == 1 && today > lock_date;

                div.innerHTML = `
                <strong>${goal.name.toUpperCase()}</strong> ${isLocked ? '🔒' : ''}<br>
                Target: ${goal.aim} before ${goal.end_date}
                <button class="edit-btn" data-id="${goal.id}" ${isLocked ? 'disabled' : ''}>
                    ${isLocked ? 'Locked' : 'Edit'}</button>
                <div class="goal_edits" id="edit${goal.id}">
                        <form method="POST" action="/edit_goal">
                            <input type="hidden" name="id" value="${goal.id}">

                            <p>I will do my goal: </p><br>
                            <input type="number" name="numTimes" 
                                value="${goal.aim}">
                            <label for="numTimes"> time(s)</label><br><br>
                            <label for="newEnd">before </label>
                            <input type="date" name="newEnd" value="${goal.end_date}">
                            <br><br>
                            <input type="submit" value="Save goal">
                        </form>
                        <form method="POST" action="/delete_goal">
                            <input type="hidden" name="id" value="${goal.id}">
                            <br>
                            <input type="submit" value="Delete goal">
                        </form>
                    </div>
                <hr>
                `;
                container.appendChild(div);
            });

        } catch (err) {
            console.error("Failed to load goals:", err);
        }
    }

    loadSettingsGoals();


</script>
